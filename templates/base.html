<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Forensic System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-dark: #0f172a;
            /* Slate 900 */
            --bg-darker: #020617;
            /* Slate 950 */
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --info: #3b82f6;
            --card-bg: #1e293b;
            /* Slate 800 */
            --border-color: #334155;
            /* Slate 700 */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Inter', -apple-system, blinkmacsystemfont, sans-serif;
            overflow-x: hidden;
        }

        /* Modern Sidebar */
        .sidebar {
            height: 100vh;
            background: linear-gradient(180deg, var(--bg-darker) 0%, #0f172a 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 30px;
            box-shadow: 4px 0 25px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .sidebar-brand {
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(79, 70, 229, 0.5);
        }

        .sidebar a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 14px 24px;
            margin: 8px 16px;
            display: flex;
            align-items: center;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .sidebar a i {
            width: 24px;
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        .sidebar a:hover {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.03);
            transform: translateX(4px);
        }

        .sidebar a:hover i {
            transform: scale(1.1);
            color: var(--info);
        }

        .sidebar a.active {
            color: #fff;
            background: linear-gradient(90deg, rgba(79, 70, 229, 0.15) 0%, rgba(79, 70, 229, 0) 100%);
            border-left: 3px solid var(--primary);
            border-radius: 0 12px 12px 0;
            margin-left: 0;
            padding-left: 37px;
            /* 16 + 24 - 3 */
        }

        .sidebar a.active i {
            color: var(--primary);
        }

        /* Main Content Area */
        .main-content {
            padding: 40px;
            min-height: 100vh;
            background-color: var(--bg-dark);
        }

        /* Premium Cards */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            overflow: hidden;
        }

        .card-header {
            background-color: rgba(255, 255, 255, 0.02) !important;
            border-bottom: 1px solid var(--border-color) !important;
            color: var(--text-light) !important;
            padding: 1.25rem 1.5rem;
        }

        h5.card-title {
            color: var(--text-light);
            font-weight: 600;
        }

        /* Stat Cards with Gradients */
        .stat-card {
            border: none;
            position: relative;
            color: #fff !important;
            z-index: 1;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PHBhdGggZD0iTTAgMGg0MHY0MEgweiIgZmlsbD0ibm9uZSIvPjxwYXRoIGQ9Ik0wIDEwaDQwdjFINHptMCAyMGg0MHYxSDB6IiBmaWxsPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMDUpIi8+PC9zdmc+') !important;
            z-index: -1;
            opacity: 0.3;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Vibrant Colors */
        .bg-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5) !important;
        }

        .bg-danger {
            background: linear-gradient(135deg, #f43f5e, #e11d48) !important;
        }

        .bg-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706) !important;
            color: #fff !important;
        }

        .bg-info {
            background: linear-gradient(135deg, #0ea5e9, #0284c7) !important;
        }

        .bg-success {
            background: linear-gradient(135deg, #10b981, #059669) !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-darker);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Text Overrides for compatibility */
        .text-dark {
            color: #0f172a !important;
        }

        .bg-white {
            background-color: var(--card-bg) !important;
            color: #f8fafc !important;
        }

        /* General Utilities */
        .bg-darker {
            background-color: var(--bg-darker) !important;
        }

        .text-muted {
            color: var(--text-muted) !important;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar position-fixed">
                <h4 class="text-center sidebar-brand"><i class="fas fa-shield-alt text-danger me-2"></i>CyberForensics
                </h4>
                <a href="/" class="{% if request.path == '/' %}active{% endif %}"><i class="fas fa-chart-line me-2"></i>
                    Dashboard</a>
                <a href="/events" class="{% if request.path == '/events' %}active{% endif %}"><i
                        class="fas fa-list me-2"></i> All Events</a>
                <a href="/anomalies" class="{% if request.path == '/anomalies' %}active{% endif %}"><i
                        class="fas fa-exclamation-triangle me-2"></i> Anomalies</a>
                <a href="/timeline" class="{% if request.path == '/timeline' %}active{% endif %}"><i
                        class="fas fa-clock me-2"></i> Attack Timeline</a>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 offset-md-2 main-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
